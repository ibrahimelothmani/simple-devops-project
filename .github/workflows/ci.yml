name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Build Backend
    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false # Dry-run validation only; set to true if pushing to a registry
        tags: school-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Build Frontend
    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false # Dry-run validation only
        tags: school-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max